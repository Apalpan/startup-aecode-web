<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>404 — AECODE</title>
<meta name="theme-color" content="#0B0D1A">
<link rel="icon" href="aecode-logo.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Plus+Jakarta+Sans:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0B0D1A;--fg:#EEF3F8;--muted:#A6ADCB;--violet:#7C7EDF;--green:#47CF78;--indigo:#4A3AC1}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;min-height:100svh;display:grid;place-items:center;text-align:center;background:var(--bg);color:var(--fg);font-family:"Plus Jakarta Sans",system-ui,sans-serif;overflow:hidden}
  .aurora{position:fixed;inset:-20vh -10vw;z-index:0;filter:blur(90px);opacity:.5;pointer-events:none}
  .aurora i{position:absolute;width:42vw;height:42vw;border-radius:50%;mix-blend-mode:screen}
  .aurora i:nth-child(1){left:-5vw;top:0;background:radial-gradient(circle,var(--indigo),transparent 65%)}
  .aurora i:nth-child(2){right:-5vw;bottom:0;background:radial-gradient(circle,var(--green),transparent 70%);opacity:.6}
  main{position:relative;z-index:1;padding:2rem}
  img{width:96px;height:auto;filter:drop-shadow(0 14px 36px rgba(124,126,223,.5));animation:f 6s ease-in-out infinite alternate}
  @keyframes f{to{transform:translateY(-10px)}}
  h1{font-family:"Space Grotesk";font-size:clamp(3rem,12vw,6rem);margin:1rem 0 0;line-height:1;background:linear-gradient(110deg,var(--violet),var(--green));-webkit-background-clip:text;background-clip:text;color:transparent}
  p{color:var(--muted);max-width:34ch;margin:.6rem auto 1.6rem}
  a{display:inline-block;padding:.8rem 1.4rem;border-radius:11px;font-weight:600;color:#0B0D1A;background:linear-gradient(120deg,var(--violet),var(--indigo) 60%,var(--green));transition:transform .15s cubic-bezier(.23,1,.32,1)}
  a:active{transform:scale(.97)}
  @media(prefers-reduced-motion:reduce){img{animation:none}}
</style>
</head>
<body>
<div class="aurora" aria-hidden="true"><i></i><i></i></div>
<main>
  <img src="aecodito.png" alt="AECODITO">
  <h1>404</h1>
  <p>Esta ruta no existe — pero AECODITO te lleva de vuelta al reporte.</p>
  <a href="/">Volver al inicio</a>
</main>
</body>
</html>
